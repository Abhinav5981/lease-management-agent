services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: lease_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: lease_user
      POSTGRES_PASSWORD: lease_pass
      POSTGRES_DB: lease_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
      - ./seeds.sql:/docker-entrypoint-initdb.d/02_seeds.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lease_user -d lease_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Qdrant vector store ─────────────────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:v1.9.0
    container_name: lease_qdrant
    restart: unless-stopped
    volumes:
      - qdrant_data:/qdrant/storage
    ports:
      - "6333:6333"   # REST / gRPC-web
      - "6334:6334"   # gRPC
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'cat < /dev/null > /dev/tcp/localhost/6333' 2>/dev/null"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── FastAPI backend ─────────────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: lease_backend
    restart: unless-stopped
    env_file:
      - .env                          # must contain OPENAI_API_KEY
    environment:
      DATABASE_URL: postgresql+asyncpg://lease_user:lease_pass@postgres:5432/lease_db
      QDRANT_URL: http://qdrant:6333  # override localhost from .env
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/health > /dev/null"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s

  # ── Next.js frontend ────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        BACKEND_URL: http://backend:8000   # server-side proxy target
    container_name: lease_frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  postgres_data:
  qdrant_data:
